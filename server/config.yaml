# DayLens Server 默认配置
# 环境变量覆盖：DAYLENS_DATABASE_URL, DAYLENS_AUTH_TOKEN 等

server:
  addr: "0.0.0.0:8080"
  internal_addr: "127.0.0.1:8081"

auth:
  token: ""                           # 留空则首次启动自动生成

database:
  url: "postgres://daylens:daylens_secret@localhost:5432/daylens?sslmode=disable"
  max_conns: 20
  min_conns: 5

# AI 配置
# provider 支持：ollama / openai / deepseek / moonshot / siliconflow / groq / zhipu / claude / gemini
# 选择 provider 后，endpoint 和 model 一般不用填，会使用预设值
# 也可以填任意 OpenAI 兼容 API 的 endpoint，provider 写 "openai" 即可
ai:
  provider: "ollama"
  endpoint: ""                        # 留空使用预设值
  model: ""                           # 留空使用预设值
  api_key: ""
  custom_prompt: ""

# 示例：使用 DeepSeek
# ai:
#   provider: "deepseek"
#   api_key: "sk-xxxx"

# 示例：使用任意 OpenAI 兼容 API
# ai:
#   provider: "openai"
#   endpoint: "https://your-proxy.com/v1"
#   model: "your-model"
#   api_key: "sk-xxxx"

storage:
  screenshot_dir: "./data/screenshots"
  retention_days: 30
  max_storage_mb: 2048
  thumbnail_width: 360

work_schedule:
  start_hour: 9
  start_minute: 0
  end_hour: 18
  end_minute: 0

tls:
  enabled: false
  cert_file: ""
  key_file: ""
